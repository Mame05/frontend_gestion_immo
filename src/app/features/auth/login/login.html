<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-5">

      <div class="card shadow p-4">

        <h2 class="text-center mb-4">
          Connexion
        </h2>

        <form (ngSubmit)="login()">

          <div class="mb-3">
            <label>Email</label>

            <input
              type="email"
              class="form-control"
              [(ngModel)]="email"
              name="email"
            >
          </div>

          <div class="mb-3">
            <label>Mot de passe</label>

            <input
              type="password"
              class="form-control"
              [(ngModel)]="mot_passe"
              name="mot_passe"
            >
          </div>

          <button
            class="btn btn-primary w-100"
          >
            Se connecter
          </button>

        </form>

      </div>

    </div>

  </div>

</div>
